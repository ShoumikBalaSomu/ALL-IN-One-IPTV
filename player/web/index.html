<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Player | ALL-IN-ONE IPTV</title>
    <link rel="stylesheet" href="player.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="sidebar">
        <div class="brand">ALL-IN-ONE</div>
        <div class="search-box">
            <input type="text" id="channel-search" placeholder="Search channels...">
        </div>
        <div class="nav-links">
            <ul class="channel-list" id="channel-list">
                <!-- Populated by JS -->
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="video-container" id="video-container">
            <video id="video-player"></video>
            
            <div class="custom-controls">
                <button class="control-btn" id="play-pause-btn">⏸</button>
                <button class="control-btn" id="mute-btn">🔊</button>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.1" value="1">
                
                <div style="flex: 1"></div>
                
                <select class="quality-selector" id="quality-selector">
                    <option value="auto">Auto</option>
                </select>
                <button class="control-btn" id="pip-btn">◲</button>
                <button class="control-btn" id="fullscreen-btn">⛶</button>
            </div>
        </div>
        
        <div class="epg-bar">
            <div class="epg-current">
                <div class="epg-title" id="epg-title">Loading Program Data...</div>
                <div class="epg-time" id="epg-time">--:-- - --:--</div>
                <div class="epg-progress-bg">
                    <div class="epg-progress-fill" id="epg-progress"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="player.js"></script>
</body>
</html>
