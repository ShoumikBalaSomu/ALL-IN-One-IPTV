name: all_in_one_iptv
description: Phase 2 Ultimate Cross-Platform IPTV & VOD Player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI & State
  flutter_riverpod: ^2.4.9
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  # Video Player (libVLC/FFmpeg backed)
  media_kit: ^1.1.0
  media_kit_video: ^1.1.0
  media_kit_libs_video: ^1.0.7
  # Network & Parsers
  dio: ^5.4.0
  xml: ^6.3.0
  m3u_nullsafe: ^1.0.0
  # Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  isar_generator: ^3.1.0

flutter:
  uses-material-design: true
