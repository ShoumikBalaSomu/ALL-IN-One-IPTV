name: Release Builds

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build_android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Build Android Player (Flutter)
      - name: Setup Java (Player)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Build Player APK
        working-directory: ./app_player
        run: |
          flutter pub get
          flutter build apk --release
          
      - name: Upload Player APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-player-artifact
          path: app_player/build/app/outputs/flutter-apk/app-release.apk

      # 2. Build Android Proxy (Kotlin)
      - name: Setup Java (Proxy)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build Proxy APK
        working-directory: ./app_proxy
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload Proxy APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-proxy-artifact
          path: app_proxy/app/build/outputs/apk/release/app-release.apk

  build_windows:
    name: Build Windows Player
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
        
      - name: Build Windows Player
        working-directory: ./app_player
        run: |
          flutter pub get
          flutter build windows --release
          
      - name: Zip Windows Build
        working-directory: ./app_player/build/windows/x64/runner/Release
        run: Compress-Archive -Path * -DestinationPath ../../../../../app-release-windows.zip
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-player-artifact
          path: app_player/app-release-windows.zip

  publish_release:
    name: Publish Release
    needs: [build_android, build_windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android Player APK
        uses: actions/download-artifact@v4
        with:
          name: android-player-artifact
          path: release-files/
          
      - name: Rename Android Player APK
        run: mv release-files/app-release.apk release-files/app_player-release.apk
          
      - name: Download Android Proxy APK
        uses: actions/download-artifact@v4
        with:
          name: android-proxy-artifact
          path: release-files/
          
      - name: Rename Android Proxy APK
        run: mv release-files/app-release.apk release-files/app_proxy-release.apk
          
      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-player-artifact
          path: release-files/
          
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
