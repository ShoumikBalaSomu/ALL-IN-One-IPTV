name: Verify Links (Deep Scan)

on:
  schedule:
    - cron: "0 6 * * 0"  # Every Sunday at 6 AM UTC
  workflow_dispatch:

jobs:
  deep-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r engine/requirements.txt

      - name: Run Deep Verification
        run: |
          python -m engine.src.main \
            --input input \
            --output output \
            --concurrency 200

      - name: Report Stats
        run: |
          echo "=== Verification Report ==="
          COMBINED=$(grep -c '^#EXTINF' output/combined_by_country.m3u 2>/dev/null || echo 0)
          VERIFIED=$(grep -c '^#EXTINF' output/checked_combined_by_country.m3u 2>/dev/null || echo 0)
          if [ "$COMBINED" -gt 0 ]; then
            PERCENT=$((VERIFIED * 100 / COMBINED))
            echo "Combined: $COMBINED channels"
            echo "Verified: $VERIFIED channels ($PERCENT%)"
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🔍 Deep link verification ($(date +%Y-%m-%d))"
          git push || echo "No changes"