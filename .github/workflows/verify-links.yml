name: Verify Links

on:
  workflow_run:
    workflows: ["Daily Update"]
    types:
      - completed
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt
          
      - name: Run Verification
        run: python -m engine.src --verify-only > verification_results.txt
        
      - name: Post Results to Summary
        run: |
          echo "### Link Verification Results" >> $GITHUB_STEP_SUMMARY
          cat verification_results.txt >> $GITHUB_STEP_SUMMARY
