name: Build Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            build_cmd: flutter build linux --release
            artifact_name: app-linux
            artifact_path: build/linux/x64/release/bundle/
          - os: ubuntu-latest
            target: android
            build_cmd: flutter build apk --release
            artifact_name: app-android-apk
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
          - os: windows-latest
            target: windows
            build_cmd: flutter build windows --release
            artifact_name: app-windows
            artifact_path: build/windows/x64/runner/Release/
          - os: macos-latest
            target: macos
            build_cmd: flutter build macos --release
            artifact_name: app-macos
            artifact_path: build/macos/Build/Products/Release/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (for Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
