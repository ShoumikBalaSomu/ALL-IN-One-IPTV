name: Build Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - platform: ubuntu-latest
            os: linux
            build-cmd: flutter build linux
            artifact-path: build/linux/x64/release/bundle
            artifact-name: linux-app
          - platform: ubuntu-latest
            os: android
            build-cmd: flutter build apk
            artifact-path: build/app/outputs/flutter-apk/app-release.apk
            artifact-name: android-app
          - platform: windows-latest
            os: windows
            build-cmd: flutter build windows
            artifact-path: build/windows/x64/runner/Release
            artifact-name: windows-app
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          
      - name: Build App
        run: ${{ matrix.build-cmd }}
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
