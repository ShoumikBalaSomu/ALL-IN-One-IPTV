name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Decode Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > player/android/app/upload-keystore.jks

      - name: Build Android (APK & AAB)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd player
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release

      - name: Build Linux (Tar)
        run: |
          cd player
          flutter build linux --release
          tar -czvf player-linux.tar.gz build/linux/x64/release/bundle

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-linux-builds
          path: |
            player/build/app/outputs/flutter-apk/app-release.apk
            player/build/app/outputs/bundle/release/app-release.aab
            player/player-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Build Windows
        run: |
          cd player
          flutter pub get
          flutter build windows --release
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath player-windows.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: player/player-windows.zip

  publish-release:
    needs: [build-android-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            android-linux-builds/app-release.apk
            android-linux-builds/app-release.aab
            android-linux-builds/player-linux.tar.gz
            windows-build/player-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
