version: '3.8'

services:
  engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: iptv-engine
    restart: unless-stopped
    volumes:
      - ../input:/app/input
      - ../output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
